<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App movie filter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <p>Stream<span class="red">Index</span></p>
        <button type="button" class="btn language">language</button>
        <button type="button" class="btn sign-in">Sign in</button>
         
      </header>

      <main class="main">
        <section class="container-filter">

           <h1 class="header-filter">Unlimited movies, tv shows, and more</h1>
          <input
            type="text"
            class="filter"
            id="filter-item"
            placeholder="  Search for movies or TV shows..."
            autocomplete="off"
          />
        </section>

        <section class="catalog"></section>

        <div class="message">
          <span>No results found. Try a different title</span>
        </div>
      </main>

      <footer class="footer">
        <span> built by kaliGix</span>
        <p class="footer-credit">&copy; 2026 -all the righ reserved</p>
      </footer>
    </div>

    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
